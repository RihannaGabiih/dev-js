<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estruturas de Decisão - Extra</title>
</head>
<body>
    <script>
        let nota = Number(prompt("Digite sua nota:"));

        if(nota>= 9){
            alert("Excelente!");
        } else if(nota>= 7){
            alert("Bom!");
        } else if(nota>=5){
            alert("Regular!");
        } else {
            alert("Reprovado!")
        }


    </script>
    
</body>
</html>
